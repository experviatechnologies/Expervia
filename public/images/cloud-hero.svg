<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f10"/>
      <stop offset="1" stop-color="#191c1e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="28%" cy="32%" r="55%">
      <stop offset="0" stop-color="#8a5cf5" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8a5cf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="76%" cy="70%" r="55%">
      <stop offset="0" stop-color="#6d3bd6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6d3bd6" stop-opacity="0"/>
