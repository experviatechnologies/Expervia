<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191c1e"/>
      <stop offset="1" stop-color="#0b0f10"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0" stop-color="#8a5cf5" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8a5cf5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 L0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#grid)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>
  <text x="500" y="510" text-anchor="middle" fill="#cbc3d7" fill-opacity="0.22"
        font-family="monospace" font-size="20" letter-spacing="2">
    CLOUD RESILIENCE IMAGE
  </text>
  <text x="500" y="540" text-anchor="middle" fill="#cbc3d7" fill-opacity="0.18"
        font-family="monospace" font-size="14" letter-spacing="1">
    replace /public/images/cloud-resilience.jpg
  </text>
</svg>
